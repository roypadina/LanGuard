name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      # Builds + tests the entire LanGuardFeature module (all the real logic).
      # The thin SwiftUI app shell is built locally — its .xcodeproj uses a
      # newer project format than the stock CI Xcode can open.
      - name: Build (Swift package)
        working-directory: LanGuardPackage
        run: swift build

      - name: Unit tests (Swift package)
        working-directory: LanGuardPackage
        run: swift test
